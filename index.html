<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>周末可以做什么</title>

<style>
body{
    margin:0;
    text-align:center;
    font-family:"Microsoft YaHei";
    background:linear-gradient(135deg,#ffd6ec,#d9ecff);
}

/* 标题（变大1号） */
#title{
    font-size:40px;
    margin:20px 0;
    cursor:pointer;
    color:#ff4fa3;
}

/* 转盘 */
canvas{
    background:white;
    border-radius:50%;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    transition:transform 2s cubic-bezier(.17,.67,.25,1);
}

/* 指针 */
.pointer{
    width:0;
    height:0;
    border-left:15px solid transparent;
    border-right:15px solid transparent;
    border-bottom:30px solid #ff4fa3;
    margin:10px auto;
}

/* 按钮放大1倍 */
.main-btn{
    margin:20px;
    padding:30px 80px;      /* 原来的一倍以上 */
    border:none;
    border-radius:40px;
    background:#ff4fa3;
    color:white;
    font-size:24px;         /* 字体变大 */
    cursor:pointer;
    transition:.3s;
}

.main-btn:hover{
    transform:scale(1.05);
}

/* 结果 */
#result{
    font-size:22px;
    margin-top:15px;
    color:#ff2f7f;
}
</style>
</head>

<body>

<h1 id="title">周末可以做什么</h1>

<div class="pointer"></div>

<canvas id="wheel" width="360" height="360"></canvas>
<br>
<button class="main-btn" onclick="spin()">抽一个 ✨</button>

<div id="result"></div>

<script>

let tasks = [
"看电影",
"去爬山",
"读书",
"学做一道新菜",
"约朋友吃饭",
"整理房间",
"跑步",
"逛公园"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const radius = canvas.width/2;
let spinning = false;

/* ===== 画转盘 ===== */
function drawWheel(highlight=-1){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const count = tasks.length;
    const angle = 2*Math.PI/count;

    for(let i=0;i<count;i++){
        ctx.beginPath();
        ctx.moveTo(radius,radius);
        ctx.arc(radius,radius,radius,i*angle,(i+1)*angle);

        if(i===highlight){
            ctx.fillStyle="#ff4fa3";
        }else{
            ctx.fillStyle=`hsl(${i*360/count},70%,80%)`;
        }

        ctx.fill();

        ctx.save();
        ctx.translate(radius,radius);
        ctx.rotate(i*angle+angle/2);
        ctx.fillStyle="#333";
        ctx.font="16px Microsoft YaHei";
        ctx.textAlign="right";
        ctx.fillText(tasks[i],radius-15,5);
        ctx.restore();
    }
}
drawWheel();

/* ===== 加快旋转（2秒完成） ===== */
function spin(){
    if(spinning) return;
    spinning=true;

    const count = tasks.length;
    const anglePer = 360/count;
    const randomIndex = Math.floor(Math.random()*count);
    const targetAngle = randomIndex*anglePer+anglePer/2;

    const finalRotation = 360*5+(270-targetAngle);

    canvas.style.transform = `rotate(${finalRotation}deg)`;

    setTimeout(()=>{
        document.getElementById("result").innerText =
        "💖 现在去："+tasks[randomIndex];

        drawWheel(randomIndex);
        spinning=false;
    },2000);   // 2秒停止（更快）
}

/* ===== 标题可点击修改 ===== */
document.getElementById("title").onclick=function(){
    const newTitle = prompt("修改标题：");
    if(newTitle && newTitle.trim()!==""){
        this.innerText = newTitle;
        document.title = newTitle;
    }
};

</script>

</body>
</html>
